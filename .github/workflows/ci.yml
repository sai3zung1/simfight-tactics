name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun run test
      # Story tests run in a real browser, so the binary has to be fetched:
      # installing the package alone leaves Playwright without one.
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:stories
      - run: bun run build
